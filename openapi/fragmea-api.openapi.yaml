      type: object
      required:
      - ref
      properties:
        ref:
          $ref: "#/components/schemas/ArgumentsDataframeRef"
        select:
          type: array
          items:
            $ref: "#/components/schemas/ArgumentDataframeSelectField"
        filter:
          $ref: "#/components/schemas/ArgumentQueryFilter"
        sort:
          type: array
          items:
            $ref: "#/components/schemas/ArgumentQuerySort"
