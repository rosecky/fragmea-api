    DataframeKind:
      type: string
      enum:
      - decisions
      - hits
      - arguments
    DataframeQueryResponseArgumentDataframeQueryRowResponse:
      type: object
      properties:
        dataframe_ref:
          $ref: "#/components/schemas/DataframeRef"
        session_id:
          type: string
        kind:
          $ref: "#/components/schemas/DataframeKind"
        row_count:
          type: integer
          format: int32
        rows:
          type: array
          items:
            $ref: "#/components/schemas/ArgumentDataframeQueryRowResponse"
    DataframeQueryResponseDecisionDataframeQueryRowResponse:
