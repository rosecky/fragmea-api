      type: object
      properties:
        row_rank:
          type: integer
          format: int32
        argument_unit_id:
          type: string
        decision_id:
          type: string
        case_number:
          type: string
        decision_date:
          type: string
        case_domain:
          type: string
        disposition_type:
          type: string
        relevance_tier:
          type: string
        speaker_type:
          $ref: "#/components/schemas/ArgumentSpeakerType"
        argument_kind:
          $ref: "#/components/schemas/ArgumentKind"
        source_path:
          type: string
        text:
          type: string
        reason:
          type: string
        topic:
          type: string
        target:
          type: string
        targeted_issues:
          type: array
          items:
            type: string
        asserted_grounds:
          type: array
          items:
            type: string
