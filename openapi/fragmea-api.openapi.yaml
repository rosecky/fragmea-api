      - argument_unit_id
      - decision_id
      - case_number
      - decision_date
      - case_domain
      - disposition_type
      - relevance_tier
      - speaker_type
      - argument_kind
      - source_path
      - text
      - reason
      - topic
      - target
      - targeted_issues
      - asserted_grounds
      - court_assessment
      - outcome_for_argument
      - success_mode
      - regulation_keys
      - precedent_keys
